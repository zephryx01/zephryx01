name: Generate contribution snake

on:
  schedule:
    - cron: "17 0 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23ff003c&color_dots=%23161b22,%23300a0a,%235a1010,%238b1a1a,%23ff003c
            dist/github-contribution-grid-snake-dark.svg?color_snake=%23ff003c&color_dots=%23161b22,%23300a0a,%235a1010,%238b1a1a,%23ff003c
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
