<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Zephryx terminal banner</title>
  <desc id="desc">Animated terminal-style banner for a SOC analyst, threat hunter, and offensive security practitioner.</desc>

  <defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#070b10"/>
    <stop offset="55%" stop-color="#0b1118"/>
    <stop offset="100%" stop-color="#120307"/>
  </linearGradient>

  <radialGradient id="glow" cx="82%" cy="20%" r="72%">
    <stop offset="0%" stop-color="#ff003c" stop-opacity="0.14"/>
    <stop offset="60%" stop-color="#ff4d6d" stop-opacity="0.05"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
  </radialGradient>

    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#8b949e" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="lineOneReveal">
      <rect x="94" y="120" width="0" height="34">
        <animate attributeName="width" values="0;0;760;760" keyTimes="0;0.10;0.42;1" dur="7s" repeatCount="indefinite"/>
      </rect>
    </clipPath>

    <clipPath id="lineTwoReveal">
      <rect x="94" y="177" width="0" height="34">
        <animate attributeName="width" values="0;0;840;840" keyTimes="0;0.44;0.78;1" dur="7s" repeatCount="indefinite"/>
      </rect>
    </clipPath>

    <clipPath id="lineThreeReveal">
      <rect x="94" y="234" width="0" height="34">
        <animate attributeName="width" values="0;0;700;700" keyTimes="0;0.79;0.96;1" dur="7s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <rect width="1200" height="360" rx="22" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="22" fill="url(#glow)"/>
  <rect width="1200" height="360" rx="22" fill="url(#grid)"/>
  <rect x="1" y="1" width="1198" height="358" rx="21" fill="none" stroke="#30363d" stroke-width="2"/>

  <rect x="0" y="0" width="1200" height="68" rx="22" fill="#0d141c"/>
  <rect x="0" y="46" width="1200" height="22" fill="#0d141c"/>
  <line x1="0" y1="68" x2="1200" y2="68" stroke="#30363d"/>

  <circle cx="34" cy="34" r="7" fill="#ff5f56"/>
  <circle cx="58" cy="34" r="7" fill="#ffbd2e"/>
  <circle cx="82" cy="34" r="7" fill="#27c93f"/>

  <text x="600" y="42" text-anchor="middle"
        fill="#8b949e" font-size="16"
        font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
    zephryx@github: ~/profile
  </text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
    <text x="68" y="145" fill="#F52727" font-size="24" font-weight="700">$</text>
    <text x="94" y="145" fill="#F52727" font-size="24" font-weight="700" clip-path="url(#lineOneReveal)">
      whoami → ZEPHRYX
    </text>

    <text x="68" y="202" fill="#3b82f6" font-size="24" font-weight="700">›</text>
    <text x="94" y="202" fill="#c9d1d9" font-size="23" clip-path="url(#lineTwoReveal)">
      SOC Analyst • Threat Hunter • Offensive Security
    </text>

    <text x="68" y="259" fill="#F52727" font-size="24" font-weight="700">›</text>
    <text x="94" y="259" fill="#c9d1d9" font-size="23" clip-path="url(#lineThreeReveal)">
      building practical security through Zephryx
    </text>

    <rect x="94" y="286" width="13" height="25" rx="2" fill="#F52727" filter="url(#softGlow)">
      <animate attributeName="opacity" values="1;1;0;0;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>

    <text x="1090" y="330" text-anchor="end" fill="#6e7681" font-size="14">
      AUTHORIZED RESEARCH ONLY
    </text>
  </g>
</svg>
